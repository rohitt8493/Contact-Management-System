{% extends "base.html" %}
{% block content %}
  <div class="card">
    <h2 style="margin-top:0">Contacts (test)</h2>

    {% if contacts %}
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="text-align:left;color:#6b7280">
            <th style="padding:8px 6px">Name</th>
            <th style="padding:8px 6px">Phone</th>
            <th style="padding:8px 6px">Email</th>
            <th style="padding:8px 6px">Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for c in contacts %}
            <tr>
              <td style="padding:8px 6px;border-top:1px solid #f1f1f1">{{ c.name }}</td>
              <td style="padding:8px 6px;border-top:1px solid #f1f1f1">{{ c.phone }}</td>
              <td style="padding:8px 6px;border-top:1px solid #f1f1f1">{{ c.email }}</td>
              <td style="padding:8px 6px;border-top:1px solid #f1f1f1">
                <a href="{{ url_for('edit_contact', contact_id=c.id) }}">Edit</a>
                <form method="post" action="{{ url_for('delete_contact', contact_id=c.id) }}" style="display:inline">
                  <button type="submit" style="background:none;border:0;color:#2563eb;cursor:pointer;padding:0;margin-left:8px">Delete</button>
                </form>
              </td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    {% else %}
      <p>No contacts yet. <a href="{{ url_for('add_contact') }}">Add one</a>.</p>
    {% endif %}
  </div>
{% endblock %}
